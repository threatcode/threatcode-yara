name: Validate YARA Syntax

on:
  pull_request:
  workflow_dispatch:

jobs:
  syntax-check:
    runs-on: ubuntu-latest

    steps:
      - name: Check-out the repository
        uses: actions/checkout@v4

      - name: Install YARA
        run: |
          sudo apt-get update
          sudo apt-get install -y yara

      - name: Show YARA version
        run: yarac --version

      - name: Validate YARA rules
        run: bash scripts/check-yara-syntax.sh
